name: CI — Commerce Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: haze21/commerce-service
  HELM_REPO: haze21/k8s-helm-charts
  HELM_VALUES_PATH: charts/commerce-service/values.yaml

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn test -B

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm chart image tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          HELM_REPO_TOKEN: ${{ secrets.HELM_REPO_TOKEN }}
          TAG: ${{ steps.meta.outputs.TAG }}
        run: |
          git clone https://x-access-token:${HELM_REPO_TOKEN}@github.com/${{ env.HELM_REPO }}.git helm-repo
          cd helm-repo
          sed -i "s/tag: .*/tag: \"${TAG}\"/" ${{ env.HELM_VALUES_PATH }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_VALUES_PATH }}
          git commit -m "cicd: update commerce-service image tag to ${TAG} [skip ci]"
          git push